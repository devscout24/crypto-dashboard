services:
  app:
    build: .
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      VITE_APP_API_URL: http://172.16.100.26:5050/api/v1
      VITE_BASE_ID: ${VITE_BASE_ID}
      VITE_ENDPOINT_URL: ${VITE_ENDPOINT_URL}
      VITE_APPWRITE_PROJECT_ID: ${VITE_APPWRITE_PROJECT_ID}
      VITE_APPWRITE_ENDPOINT: ${VITE_APPWRITE_ENDPOINT}

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/usr/share/nginx/html
    depends_on:
      - app

  bun:
    image: oven/bun:1.1.34
    working_dir: /app
    volumes:
      - ./:/app
    command: bun install --frozen-lockfile
